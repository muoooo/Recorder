<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoomLink</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f11;
            --surface: #1a1a1f;
            --surface2: #24242b;
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.15);
            --text: #f0eff4;
            --muted: #888894;
            --accent: #7c6af7;
            --accent-dim: rgba(124, 106, 247, 0.15);
            --accent-border: rgba(124, 106, 247, 0.4);
            --success: #3ecf8e;
            --success-dim: rgba(62, 207, 142, 0.12);
            --danger: #f87171;
            --radius: 10px;
            --radius-sm: 6px;
            --mono: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.25rem;
        }

        .logo span {
            color: var(--accent);
        }

        .tagline {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 2.5rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
            width: 100%;
            max-width: 440px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            height: 40px;
            padding: 0 1rem;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border-strong);
            background: var(--surface2);
            color: var(--text);
            transition: background 0.15s, border-color 0.15s, opacity 0.15s;
            white-space: nowrap;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-accent {
            background: var(--accent);
            border-color: transparent;
            color: #fff;
        }

        .btn-accent:hover {
            background: #6b59e0;
            border-color: transparent;
        }

        .btn-full {
            width: 100%;
        }

        input[type="text"] {
            width: 100%;
            height: 40px;
            background: var(--surface2);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            padding: 0 0.75rem;
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-border);
        }

        input[type="text"]::placeholder {
            color: var(--muted);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.5rem 0;
            color: var(--muted);
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 1rem;
            padding: 0.6rem 0.75rem;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--muted);
            flex-shrink: 0;
        }

        .dot.online {
            background: var(--success);
            box-shadow: 0 0 6px rgba(62, 207, 142, 0.5);
        }

        .dot.error {
            background: var(--danger);
        }

        .room-display {
            margin: 1rem 0;
            padding: 1rem;
            background: var(--accent-dim);
            border: 1px solid var(--accent-border);
            border-radius: var(--radius-sm);
        }

        .room-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 0.4rem;
        }

        .room-id {
            font-family: var(--mono);
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--text);
        }

        .copy-row {
            display: flex;
            gap: 8px;
            margin-top: 0.75rem;
        }

        .copy-row input {
            flex: 1;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
        }

        .peers-section {
            margin-top: 1.25rem;
        }

        .peers-label {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 0.6rem;
        }

        .peer-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .peer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0.75rem;
            background: var(--success-dim);
            border: 1px solid rgba(62, 207, 142, 0.2);
            border-radius: var(--radius-sm);
            font-size: 13px;
        }

        .peer-name {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .peer-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }

        .msg-log {
            margin-top: 1.25rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.75rem;
            max-height: 180px;
            overflow-y: auto;
            font-family: var(--mono);
            font-size: 12px;
            line-height: 1.6;
            color: var(--muted);
        }

        .msg-log .msg-line {
            padding: 1px 0;
        }

        .msg-log .msg-line.system {
            color: var(--accent);
            opacity: 0.7;
        }

        .msg-log .msg-line.incoming {
            color: var(--success);
        }

        .msg-log .msg-line.outgoing {
            color: var(--text);
        }

        .send-row {
            display: flex;
            gap: 8px;
            margin-top: 0.75rem;
        }

        .send-row input {
            flex: 1;
        }

        .hidden {
            display: none !important;
        }

        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            padding: 0.6rem 1rem;
            font-size: 13px;
            color: var(--text);
            transition: transform 0.2s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.25rem;
            }

            .room-id {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="logo">Room<span>Link</span></div>
    <p class="tagline">Serverless peer-to-peer rooms · No account needed</p>

    <!-- LOBBY -->
    <div class="card" id="lobby">
        <div class="status-bar">
            <span class="dot" id="status-dot"></span>
            <span id="status-text">Connecting to network…</span>
        </div>

        <div class="card-title">Create a room</div>
        <button class="btn btn-accent btn-full" id="create-btn" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Create new room
        </button>

        <div class="divider">or join existing</div>

        <div class="card-title">Join a room</div>
        <div style="display:flex;gap:8px;">
            <input type="text" id="join-input" placeholder="Paste room ID…" maxlength="40" />
            <button class="btn btn-accent" id="join-btn" disabled>Join</button>
        </div>
    </div>

    <!-- ROOM -->
    <div class="card hidden" id="room-panel">
        <div class="status-bar">
            <span class="dot online"></span>
            <span id="room-status-text">Connected</span>
        </div>

        <div id="room-display-area">
            <div class="room-display">
                <div class="room-label">Your room ID</div>
                <div class="room-id" id="room-id-display"></div>
            </div>
            <div class="copy-row">
                <input type="text" id="share-link" readonly />
                <button class="btn" id="copy-btn">Copy link</button>
            </div>
        </div>

        <div class="peers-section">
            <div class="peers-label">People in this room — <span id="peer-count">0</span> connected</div>
            <div class="peer-list" id="peer-list">
                <div style="font-size:13px;color:var(--muted);padding:0.5rem 0">Waiting for others to join…</div>
            </div>
        </div>

        <div class="msg-log" id="msg-log">
            <div class="msg-line system">// Room ready. Share the link above to invite others.</div>
        </div>

        <div class="send-row">
            <input type="text" id="msg-input" placeholder="Send a message to everyone…" />
            <button class="btn btn-accent" id="send-btn">Send</button>
        </div>

        <div style="margin-top:1rem;">
            <button class="btn btn-full" id="leave-btn"
                style="border-color:rgba(248,113,113,0.3);color:var(--danger);">Leave room</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ---- state ----
        let peer = null;
        let myId = null;
        let connections = {};   // peerId -> DataConnection
        let isHost = false;
        let hostId = null;      // only set when we're a guest

        // ---- UI refs ----
        const lobby = document.getElementById('lobby');
        const roomPanel = document.getElementById('room-panel');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const createBtn = document.getElementById('create-btn');
        const joinBtn = document.getElementById('join-btn');
        const joinInput = document.getElementById('join-input');
        const roomIdDisplay = document.getElementById('room-id-display');
        const shareLink = document.getElementById('share-link');
        const copyBtn = document.getElementById('copy-btn');
        const peerList = document.getElementById('peer-list');
        const peerCount = document.getElementById('peer-count');
        const msgLog = document.getElementById('msg-log');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const leaveBtn = document.getElementById('leave-btn');
        const toastEl = document.getElementById('toast');

        // ---- helpers ----
        function toast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            setTimeout(() => toastEl.classList.remove('show'), 2200);
        }

        function log(text, type = 'system') {
            const line = document.createElement('div');
            line.className = 'msg-line ' + type;
            line.textContent = text;
            msgLog.appendChild(line);
            msgLog.scrollTop = msgLog.scrollHeight;
        }

        function shortId(id) {
            return id.substring(0, 8) + '…';
        }

        function renderPeers() {
            const ids = Object.keys(connections);
            peerCount.textContent = ids.length;
            if (ids.length === 0) {
                peerList.innerHTML = '<div style="font-size:13px;color:var(--muted);padding:0.5rem 0">Waiting for others to join…</div>';
                return;
            }
            peerList.innerHTML = '';
            ids.forEach(id => {
                const item = document.createElement('div');
                item.className = 'peer-item';
                item.innerHTML = `
        <span class="peer-name">
          <span class="peer-dot"></span>
          <span>${shortId(id)}</span>
        </span>
        <span style="font-size:11px;color:var(--muted)">connected</span>
      `;
                peerList.appendChild(item);
            });
        }

        // ---- PeerJS init ----
        function initPeer(customId) {
            const options = {
                debug: 0,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            };
            peer = customId ? new Peer(customId, options) : new Peer(options);

            peer.on('open', (id) => {
                myId = id;
                statusDot.classList.add('online');
                statusText.textContent = 'Ready';
                createBtn.disabled = false;
                joinBtn.disabled = false;
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    toast('Room ID already taken or expired — try again');
                    peer.destroy();
                    initPeer(); // fallback to random id
                    return;
                }
                statusDot.classList.remove('online');
                statusDot.classList.add('error');
                statusText.textContent = 'Connection error: ' + err.type;
                console.error(err);
            });

            peer.on('disconnected', () => {
                statusDot.classList.remove('online');
                statusText.textContent = 'Disconnected — reconnecting…';
                peer.reconnect();
            });

            // Host: accept incoming connections
            peer.on('connection', (conn) => {
                setupConnection(conn, 'incoming');
            });
        }

        // ---- connection setup ----
        function setupConnection(conn, direction) {
            conn.on('open', () => {
                connections[conn.peer] = conn;
                renderPeers();
                log(`// ${shortId(conn.peer)} joined the room`, 'system');

                if (isHost) {
                    // tell new joiner about all other peers
                    const others = Object.keys(connections).filter(id => id !== conn.peer);
                    if (others.length > 0) {
                        conn.send({ type: 'peer-list', peers: others });
                    }
                    // tell everyone else about new joiner
                    others.forEach(id => {
                        if (connections[id] && connections[id].open) {
                            connections[id].send({ type: 'new-peer', peerId: conn.peer });
                        }
                    });
                }
            });

            conn.on('data', (data) => {
                if (data && data.type === 'peer-list') {
                    // Connect to existing peers in the room (mesh)
                    data.peers.forEach(peerId => {
                        if (!connections[peerId]) {
                            const c = peer.connect(peerId, { reliable: true });
                            setupConnection(c, 'outgoing');
                        }
                    });
                } else if (data && data.type === 'new-peer') {
                    if (!connections[data.peerId]) {
                        const c = peer.connect(data.peerId, { reliable: true });
                        setupConnection(c, 'outgoing');
                    }
                } else if (data && data.type === 'chat') {
                    log(`${shortId(conn.peer)}: ${data.msg}`, 'incoming');
                    // relay to others (host relays to everyone)
                    if (isHost) {
                        Object.keys(connections).forEach(id => {
                            if (id !== conn.peer && connections[id].open) {
                                connections[id].send(data);
                            }
                        });
                    }
                }
            });

            conn.on('close', () => {
                delete connections[conn.peer];
                renderPeers();
                log(`// ${shortId(conn.peer)} left the room`, 'system');
            });

            conn.on('error', (err) => {
                console.warn('conn error', err);
                delete connections[conn.peer];
                renderPeers();
            });
        }

        // ---- create room ----
        createBtn.addEventListener('click', () => {
            isHost = true;
            hostId = myId;
            openRoom(myId);
        });

        // ---- join room ----
        joinBtn.addEventListener('click', doJoin);
        joinInput.addEventListener('keydown', e => { if (e.key === 'Enter') doJoin(); });

        function doJoin() {
            const target = joinInput.value.trim();
            if (!target) return;

            // Support pasting full URL
            let roomId = target;
            try {
                const u = new URL(target);
                const r = u.searchParams.get('room');
                if (r) roomId = r;
            } catch { }

            if (roomId === myId) { toast("That's your own ID!"); return; }

            isHost = false;
            hostId = roomId;
            openRoom(myId);

            // Connect to host
            const conn = peer.connect(roomId, { reliable: true });
            setupConnection(conn, 'outgoing');
            log(`// Joining room ${shortId(roomId)}…`, 'system');
        }

        // ---- open room UI ----
        function openRoom(roomId) {
            lobby.classList.add('hidden');
            roomPanel.classList.remove('hidden');
            roomIdDisplay.textContent = roomId;

            const link = location.href.split('?')[0] + '?room=' + roomId;
            shareLink.value = link;
        }

        // ---- copy link ----
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(shareLink.value).then(() => toast('Link copied!'));
        });

        // ---- send message ----
        sendBtn.addEventListener('click', sendMsg);
        msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

        function sendMsg() {
            const msg = msgInput.value.trim();
            if (!msg) return;
            msgInput.value = '';
            const packet = { type: 'chat', msg };
            Object.values(connections).forEach(conn => {
                if (conn.open) conn.send(packet);
            });
            log(`you: ${msg}`, 'outgoing');
        }

        // ---- leave ----
        leaveBtn.addEventListener('click', () => {
            Object.values(connections).forEach(c => c.close());
            connections = {};
            peer.destroy();
            isHost = false;
            hostId = null;
            roomPanel.classList.add('hidden');
            lobby.classList.remove('hidden');
            statusDot.classList.remove('online');
            statusDot.classList.add('');
            createBtn.disabled = true;
            joinBtn.disabled = true;
            statusText.textContent = 'Reconnecting…';
            initPeer();
        });

        // ---- auto-join from URL ----
        function checkUrlRoom() {
            const params = new URLSearchParams(location.search);
            const roomParam = params.get('room');
            if (roomParam) {
                joinInput.value = roomParam;
            }
        }

        // ---- boot ----
        initPeer();
        checkUrlRoom();
    </script>
</body>

</html>
